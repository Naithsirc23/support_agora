<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agora - Soporte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(to bottom, #d1fae5, #ecfdf5); min-height: 100vh; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass p-8 max-w-md w-full shadow-xl">
        <h1 class="text-2xl font-bold text-emerald-800 mb-2">Agora</h1>
        <p class="text-emerald-600 mb-6 text-sm">Centro de Soporte y Calma</p>
        <form action="#" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-emerald-700 uppercase">Email</label>
                <input type="email" class="w-full p-2 bg-white/50 border border-emerald-200 rounded-lg outline-none focus:ring-2 focus:ring-emerald-400">
            </div>
            <div>
                <label class="block text-xs font-semibold text-emerald-700 uppercase">Mensaje</label>
                <textarea class="w-full p-2 bg-white/50 border border-emerald-200 rounded-lg outline-none focus:ring-2 focus:ring-emerald-400" rows="4"></textarea>
            </div>
            <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700 transition-colors duration-300 shadow-md">Enviar consulta</button>
        </form>
    </div>
</body>
</html>
